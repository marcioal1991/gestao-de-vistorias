; A análise de fotos via OpenAI (modelo de raciocínio) pode demorar, então damos
; bastante folga aqui para o php-fpm não matar a requisição no meio da chamada,
; o que travava o spinner "Analisando com IA..." para sempre.
max_execution_time = 300
max_input_time = 300

; Fotos tiradas direto da câmera do celular (ex: iPhone) podem ser bem grandes.
upload_max_filesize = 100M
post_max_size = 100M

; Uma foto de 100M vira ~133M em base64, e a comparação de saída carrega duas
; fotos (entrada + saída) ao mesmo tempo na memória.
memory_limit = 512M
